aedg_timeline:
  - title: 'AEDG Version 3.0'
    date: '2024–2025'
    description: "University partners ISER and ACEP launch a revitalized AEDG with updated datasets, enhanced tools, and a modernized interface."

  - title: 'State Support'
    date: '2024'
    description: "The Alaska State Legislature allocates funding to support the revitalization of the AEDG."

  - title: 'AEDG Version 2.0'
    date: '2017'
    description: "AEDG was redesigned & extended by ACEP and ISER in collaboration with Lawrence Berkeley National Laboratory (LBNL)."

  - title: 'AEDG Version 1.2'
    date: '2013-2014'
    description: "Phase II of DOE EPSCoR project continuing to automate the data processing to provide accessibility to public and private stakeholders, agency partners, and researchers."

  - title: 'AEDG Version 1.0'
    date: '2010-2013'
    description:  "Developed during ACEP’s first DOE EPSCoR project with strong leadership from ISER, the initial AEDG consisted of a remotely deployable data collection system and an integrated access portal."